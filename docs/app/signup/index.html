<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | BowlsTrack</title>
    <meta name="description" content="Create your free BowlsTrack account and start tracking your lawn bowls performance.">

    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='45' fill='%23155e3d'/><circle cx='50' cy='50' r='8' fill='%23fbbf24'/></svg>">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --green-900: #0f3d2b;
            --green-800: #155e3d;
            --green-700: #1a7a4c;
            --green-600: #22995f;
            --green-500: #2db572;
            --gold-500: #fbbf24;
            --gold-400: #fcd34d;
            --cream: #fefdf8;
            --cream-dark: #f5f3eb;
            --slate-900: #1e293b;
            --slate-700: #334155;
            --slate-500: #64748b;
            --slate-300: #cbd5e1;
            --red-500: #ef4444;
            --red-100: #fee2e2;
            --font-display: 'DM Serif Display', Georgia, serif;
            --font-body: 'DM Sans', system-ui, sans-serif;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: var(--font-body);
            background: var(--cream);
            color: var(--slate-900);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            text-decoration: none;
            color: var(--green-800);
            margin-bottom: 2rem;
        }
        .logo svg { width: 40px; height: 40px; }
        .logo span { font-family: var(--font-display); font-size: 1.5rem; }

        .auth-card {
            background: white;
            border-radius: 16px;
            padding: 2.5rem;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
            border: 1px solid var(--slate-300);
        }

        .auth-card h1 {
            font-family: var(--font-display);
            font-size: 1.75rem;
            color: var(--green-900);
            margin-bottom: 0.5rem;
            text-align: center;
        }

        .auth-card .subtitle {
            text-align: center;
            color: var(--slate-500);
            font-size: 0.95rem;
            margin-bottom: 2rem;
        }

        .tabs {
            display: flex;
            border-bottom: 2px solid var(--cream-dark);
            margin-bottom: 1.5rem;
        }
        .tab {
            flex: 1;
            padding: 0.75rem;
            text-align: center;
            font-weight: 600;
            font-size: 0.95rem;
            color: var(--slate-500);
            background: none;
            border: none;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            margin-bottom: -2px;
            transition: all 0.2s;
        }
        .tab.active {
            color: var(--green-800);
            border-bottom-color: var(--green-800);
        }

        .form-group {
            margin-bottom: 1.25rem;
        }
        .form-group label {
            display: block;
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--slate-700);
            margin-bottom: 0.5rem;
        }
        .form-group input {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 2px solid var(--slate-300);
            border-radius: 8px;
            font-size: 1rem;
            font-family: var(--font-body);
            transition: border-color 0.2s;
            outline: none;
        }
        .form-group input:focus {
            border-color: var(--green-600);
        }

        .btn {
            display: block;
            width: 100%;
            padding: 0.875rem;
            border-radius: 8px;
            font-weight: 600;
            font-size: 1rem;
            text-align: center;
            cursor: pointer;
            border: none;
            font-family: var(--font-body);
            transition: all 0.2s ease;
        }
        .btn-primary {
            background: var(--green-800);
            color: white;
        }
        .btn-primary:hover {
            background: var(--green-700);
        }
        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .error-message {
            background: var(--red-100);
            color: var(--red-500);
            padding: 0.75rem 1rem;
            border-radius: 8px;
            font-size: 0.9rem;
            margin-bottom: 1rem;
            display: none;
        }
        .error-message.visible { display: block; }

        .success-message {
            background: #dcfce7;
            color: var(--green-800);
            padding: 0.75rem 1rem;
            border-radius: 8px;
            font-size: 0.9rem;
            margin-bottom: 1rem;
            display: none;
        }
        .success-message.visible { display: block; }

        .auth-form { display: none; }
        .auth-form.active { display: block; }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 1.5rem;
            color: var(--slate-500);
            font-size: 0.9rem;
            text-decoration: none;
        }
        .back-link:hover { color: var(--green-700); }

        .free-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.25rem;
            background: #dcfce7;
            color: var(--green-800);
            padding: 0.25rem 0.75rem;
            border-radius: 100px;
            font-size: 0.8rem;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <a href="/" class="logo">
        <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="50" cy="50" r="45" fill="#155e3d"/>
            <circle cx="50" cy="50" r="35" stroke="#1a7a4c" stroke-width="2" fill="none"/>
            <circle cx="50" cy="50" r="25" stroke="#1a7a4c" stroke-width="1.5" fill="none"/>
            <circle cx="50" cy="50" r="15" stroke="#1a7a4c" stroke-width="1" fill="none"/>
            <circle cx="50" cy="50" r="6" fill="#fbbf24"/>
        </svg>
        <span>BowlsTrack</span>
    </a>

    <div class="auth-card">
        <h1>Welcome</h1>
        <p class="subtitle">Start tracking your game for free <span class="free-badge">Essential Plan</span></p>

        <div class="tabs">
            <button class="tab active" data-tab="signup" onclick="switchTab('signup')">Sign Up</button>
            <button class="tab" data-tab="signin" onclick="switchTab('signin')">Sign In</button>
        </div>

        <div id="error" class="error-message"></div>
        <div id="success" class="success-message"></div>

        <form id="signup-form" class="auth-form active" onsubmit="handleSignUp(event)">
            <div class="form-group">
                <label for="signup-email">Email address</label>
                <input type="email" id="signup-email" placeholder="you@example.com" required>
            </div>
            <div class="form-group">
                <label for="signup-password">Password</label>
                <input type="password" id="signup-password" placeholder="At least 6 characters" minlength="6" required>
            </div>
            <button type="submit" class="btn btn-primary" id="signup-btn">Create Free Account</button>
        </form>

        <form id="signin-form" class="auth-form" onsubmit="handleSignIn(event)">
            <div class="form-group">
                <label for="signin-email">Email address</label>
                <input type="email" id="signin-email" placeholder="you@example.com" required>
            </div>
            <div class="form-group">
                <label for="signin-password">Password</label>
                <input type="password" id="signin-password" placeholder="Your password" required>
            </div>
            <button type="submit" class="btn btn-primary" id="signin-btn">Sign In</button>
        </form>
    </div>

    <a href="/" class="back-link">&larr; Back to bowlstrack.com</a>

    <script>
        const SUPABASE_URL = 'https://ckgppsxswmpzrngzpacv.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNrZ3Bwc3hzd21wenJuZ3pwYWN2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDgyNzA3NzQsImV4cCI6MjA2Mzg0Njc3NH0.S2GS1Wv6x8NjYU2JCkN8e-gMwNSB5MHSzWYDLNjr2dQ';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // Check if already logged in
        supabase.auth.getSession().then(({ data: { session } }) => {
            if (session) {
                window.location.href = '/app/dashboard/';
            }
        });

        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelector(`[data-tab="${tab}"]`).classList.add('active');
            document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
            document.getElementById(`${tab}-form`).classList.add('active');
            hideMessages();
        }

        function showError(msg) {
            const el = document.getElementById('error');
            el.textContent = msg;
            el.classList.add('visible');
            document.getElementById('success').classList.remove('visible');
        }

        function showSuccess(msg) {
            const el = document.getElementById('success');
            el.textContent = msg;
            el.classList.add('visible');
            document.getElementById('error').classList.remove('visible');
        }

        function hideMessages() {
            document.getElementById('error').classList.remove('visible');
            document.getElementById('success').classList.remove('visible');
        }

        async function handleSignUp(e) {
            e.preventDefault();
            const btn = document.getElementById('signup-btn');
            btn.disabled = true;
            btn.textContent = 'Creating account...';
            hideMessages();

            const email = document.getElementById('signup-email').value;
            const password = document.getElementById('signup-password').value;

            const { data, error } = await supabase.auth.signUp({ email, password });

            if (error) {
                showError(error.message);
                btn.disabled = false;
                btn.textContent = 'Create Free Account';
                return;
            }

            if (data.user && data.user.identities && data.user.identities.length === 0) {
                showError('An account with this email already exists. Please sign in.');
                btn.disabled = false;
                btn.textContent = 'Create Free Account';
                return;
            }

            if (data.session) {
                window.location.href = '/app/dashboard/';
            } else {
                showSuccess('Check your email for a confirmation link, then sign in.');
                btn.disabled = false;
                btn.textContent = 'Create Free Account';
            }
        }

        async function handleSignIn(e) {
            e.preventDefault();
            const btn = document.getElementById('signin-btn');
            btn.disabled = true;
            btn.textContent = 'Signing in...';
            hideMessages();

            const email = document.getElementById('signin-email').value;
            const password = document.getElementById('signin-password').value;

            const { data, error } = await supabase.auth.signInWithPassword({ email, password });

            if (error) {
                showError(error.message);
                btn.disabled = false;
                btn.textContent = 'Sign In';
                return;
            }

            window.location.href = '/app/dashboard/';
        }
    </script>
</body>
</html>
